<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Georgian Keyboard Converter</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f7f9fc 0%, #e8f4f8 100%);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #2c5f2d;
            margin: 0 0 8px 0;
        }
        
        .subtitle {
            font-size: 12px;
            color: #64748b;
            margin: 0;
        }
        
        .content {
            text-align: center;
        }
        
        .status {
            padding: 12px;
            background: rgba(139, 195, 74, 0.1);
            border: 1px solid rgba(139, 195, 74, 0.3);
            border-radius: 8px;
            color: #2c5f2d;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .instructions {
            font-size: 13px;
            color: #64748b;
            line-height: 1.5;
            text-align: left;
        }
        
        .instruction-item {
            margin-bottom: 8px;
            padding-left: 16px;
            position: relative;
        }
        
        .instruction-item::before {
            content: "•";
            color: #8bc34a;
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        
        .example {
            background: rgba(248, 250, 252, 0.8);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #475569;
            margin: 8px 0;
            border-left: 3px solid #8bc34a;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">Georgian ⇄ English</h1>
        <p class="subtitle">Keyboard Layout Converter</p>
    </div>
    
    <div class="content">
        <div class="status">
            ✓ Extension is active and monitoring your typing
        </div>
        
        <div class="instructions">
            <div class="instruction-item">Type in any text field on websites</div>
            <div class="instruction-item">If Georgian characters are detected, you'll see a suggestion</div>
            <div class="instruction-item">Click "Replace" to convert automatically</div>
        </div>
        
        <div class="example">
            Example:<br>
            "დჰელლო ჟორლდ" → "dhello world"
        </div>
    </div>
</body>
</html>
